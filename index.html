<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Earth Digital Twin</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/cesium@1.119/Build/Cesium/Widgets/widgets.css"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="toolbar" aria-label="Viewer controls">
      <h1>Earth Digital Twin</h1>
      <p class="subtitle">Photoreal globe with cloud and night-light layers</p>
      <div class="control-row">
        <label class="toggle">
          <input id="nightToggle" type="checkbox" />
          <span>Night lights</span>
        </label>
      </div>
      <div class="control-row">
        <label for="dateTime">Orbital date/time (UTC)</label>
        <input id="dateTime" type="datetime-local" step="60" />
      </div>
      <div class="control-row compact">
        <button id="nowBtn" type="button">Now</button>
        <button id="orbitalViewBtn" type="button">Orbital view</button>
      </div>
      <p class="hint">
        Scroll to zoom from space to city-scale. Hold right-click to tilt and pan.
      </p>
    </div>

    <div id="cesiumContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/cesium@1.119/Build/Cesium/Cesium.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
